services:
  app:
    build: .
    image: filamentos
    container_name: filamentos
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - backend/.env
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/data.db
    volumes:
      - sqlite_data:/data

volumes:
  sqlite_data:
    driver: local
