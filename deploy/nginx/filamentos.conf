# ─────────────────────────────────────────────────────────────────────────────
#  Nginx site config para FilamentOS
#
#  Dónde va en el VPS:
#    /etc/nginx/sites-available/filamentos.conf
#    sudo ln -s /etc/nginx/sites-available/filamentos.conf /etc/nginx/sites-enabled/
#
#  Este archivo es la PLANTILLA previa a Certbot.
#  Certbot lo editará automáticamente cuando ejecutes:
#    sudo certbot --nginx -d tudominio.com -d www.tudominio.com
#  y añadirá el bloque HTTPS + redirección HTTP→HTTPS.
# ─────────────────────────────────────────────────────────────────────────────

# Upstream = dónde está el backend. Coincide con el port binding del compose.
upstream filamentos_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;

    # CAMBIAR por tu dominio real (coincide con el certificado de Let's Encrypt).
    server_name CAMBIAR.tudominio.com www.CAMBIAR.tudominio.com;

    # Tamaño máximo de subida (logos, PDFs). Ajusta si tus uploads son mayores.
    client_max_body_size 25M;

    # ── Headers de seguridad (higiene básica) ──
    # HSTS se añadirá cuando Certbot ponga el HTTPS. No lo pongas aquí todavía
    # o te bloqueará en HTTP si algo falla.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── Compresión ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml;

    # ── Logs separados para este sitio ──
    access_log /var/log/nginx/filamentos.access.log;
    error_log  /var/log/nginx/filamentos.error.log warn;

    # ── Proxy al backend ──
    location / {
        proxy_pass http://filamentos_backend;

        # Headers importantes para que Express sepa quién es el cliente real
        # y para que passport-google-oauth construya bien las URLs de callback.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # HTTP/1.1 + keepalive hacia el upstream = menos handshakes, más rápido.
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Timeouts generosos por si Puppeteer tarda en generar un PDF grande.
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Buffers razonables
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    # Bloquear acceso a ficheros "ocultos" por si acaso.
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }
}
