# ─────────────────────────────────────────────────────────────────────────────
#  docker-compose.prod.yml  —  Despliegue en VPS (Ubuntu 24.04)
#  Regla mnemotécnica: "L.A.V.A."  →  Localhost, Auto-restart, Volúmenes, Aislamiento
#  - Localhost: puerto 3001 SOLO accesible en 127.0.0.1 (Nginx hace de puerta)
#  - Auto-restart: el contenedor vuelve si se cae o si reinicia el VPS
#  - Volúmenes: datos persistentes fuera del contenedor (DB + uploads)
#  - Aislamiento: red propia, logs rotados para no llenar el disco
#
#  USO EN EL VPS:
#    cd /opt/filamentos
#    docker compose -f deploy/docker-compose.prod.yml --env-file backend/.env up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  spoolman:
    image: ghcr.io/donkie/spoolman:latest
    container_name: spoolman
    restart: unless-stopped
    ports:
      - "127.0.0.1:7912:7912"
    volumes:
      - spoolman_data:/home/app/.local/share/spoolman
    networks:
      - filamentos_net

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: filamentos:prod
    container_name: filamentos
    restart: unless-stopped

    # Solo escuchamos en loopback — Nginx del host es el único que entra.
    # Si pusieras "3001:3001" sin IP, internet llegaría directo al Express.
    ports:
      - "127.0.0.1:3001:3001"

    env_file:
      - ../backend/.env

    environment:
      - NODE_ENV=production
      - DB_PATH=/data/data.db
      - SPOOLMAN_BASE_URL=http://spoolman:7912
      - SPOOLMAN_TIMEOUT_MS=10000

    volumes:
      # Base de datos SQLite persistente
      - sqlite_data:/data
      # Logos subidos por usuarios (antes se perdían al recrear el contenedor)
      - uploads_data:/app/backend/uploads

    # El contenedor se marca "unhealthy" si el backend deja de responder.
    # Usamos el binario de node con un fetch rápido al endpoint raíz.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    # Evita que los logs del contenedor se coman el disco del VPS.
    # Máximo 30 MB por contenedor (3 archivos de 10 MB).
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - filamentos_net

volumes:
  sqlite_data:
    driver: local
  uploads_data:
    driver: local
  spoolman_data:
    driver: local

networks:
  filamentos_net:
    driver: bridge
